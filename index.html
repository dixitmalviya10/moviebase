<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b0f" />


    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="preconnect" href="https://api.themoviedb.org" />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />

    <title data-seo-fallback>MovieBase — Discover Movies, TV Shows &amp; People</title>
    <meta
      data-seo-fallback
      name="description"
      content="Discover millions of movies, TV shows and people. Search, browse trending titles, read cast and crew credits, and watch the latest trailers."
    />
    <meta data-seo-fallback property="og:site_name" content="MovieBase" />
    <meta data-seo-fallback property="og:type" content="website" />
    <meta
      data-seo-fallback
      property="og:title"
      content="MovieBase — Discover Movies, TV Shows &amp; People"
    />
    <meta
      data-seo-fallback
      property="og:description"
      content="Discover millions of movies, TV shows and people. Search, browse trending titles, read cast and crew credits, and watch the latest trailers."
    />
    <!-- Absolute: og:image is fetched off-origin, so a relative path resolves
         against the crawler, not the site. These fallbacks exist for exactly the
         crawlers that don't run JS (Facebook/X/WhatsApp/Slack). -->
    <meta
      data-seo-fallback
      property="og:image"
      content="https://moviebase-psi.vercel.app/assets/images/movie-banner.jpg"
    />
    <meta data-seo-fallback property="og:image:width" content="1200" />
    <meta data-seo-fallback property="og:image:height" content="630" />
    <meta data-seo-fallback name="twitter:card" content="summary_large_image" />
    <meta
      data-seo-fallback
      name="twitter:title"
      content="MovieBase — Discover Movies, TV Shows &amp; People"
    />
    <meta
      data-seo-fallback
      name="twitter:description"
      content="Discover millions of movies, TV shows and people. Search, browse trending titles, read cast and crew credits, and watch the latest trailers."
    />
    <meta
      data-seo-fallback
      name="twitter:image"
      content="https://moviebase-psi.vercel.app/assets/images/movie-banner.jpg"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('moviebase-theme') || 'dark';
          var root = document.documentElement;
          root.classList.toggle('dark', t === 'dark');
          root.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
