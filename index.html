<!doctype html>
<html lang="en" class="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MovieBase — discover millions of movies, TV shows and people. Search, browse trending titles and watch the latest trailers."
    />
    <title>MovieBase — Discover Movies, TV Shows &amp; People</title>
    <script>
      // Apply persisted theme before paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('moviebase-theme') || 'dark';
          var root = document.documentElement;
          root.classList.toggle('dark', t === 'dark');
          root.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
